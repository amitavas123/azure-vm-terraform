trigger: none

pool:
  vmImage: ubuntu-latest

steps:
# Install Terraform
- task: TerraformInstaller@1
  displayName: "Install Terraform"
  inputs:
    terraformVersion: 'latest'

# Terraform Init with AzureRM backend
- task: TerraformTaskV4@4
  displayName: "Terraform Init"
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/azure_vm/terraform'
    backendServiceArm: 'terraform-azure-sp-conn'
    backendAzureRmResourceGroupName: 'Staging_VMs'
    backendAzureRmStorageAccountName: 'storagevmazuredevopsacc'
    backendAzureRmContainerName: 'storagevmazuredevopscontainer'
    backendAzureRmKey: 'terraform.tfstate'

# Terraform Plan
- task: TerraformTaskV4@4
  displayName: "Terraform Plan"
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/azure_vm/terraform'
    environmentServiceNameAzureRM: 'ado-terraform-conn'

# Terraform Apply
- task: TerraformTaskV4@4
  displayName: "Terraform Apply"
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(System.DefaultWorkingDirectory)/azure_vm/terraform'
    environmentServiceNameAzureRM: 'terraform-azure-sp-conn'
    commandOptions: '-auto-approve'
